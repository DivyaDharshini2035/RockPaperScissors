<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="" class="move-btn rock-btn"><img src="rock-emoji.png" class="move-icon"></button>
    <button onclick="" class="move-btn paper-btn"><img src="paper-emoji.png" class="move-icon"></button>
    <button onclick="" class="move-btn scissors-btn"><img src="scissors-emoji.png" class="move-icon"></button>
    <p class="js-gameResult" ></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
    <button onclick="reset();" class="reset-btn">Reset Scores</button>
    <button class="auto-play-btn" onclick="
    autoplay()">Auto Play</button>

    <script src="index.js"></script>
</body>
</html>
